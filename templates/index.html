<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-purple-600/20 rounded-full blur-[100px] -z-10"></div>
    <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-blue-600/20 rounded-full blur-[100px] -z-10"></div>

    <main class="glass rounded-3xl p-8 max-w-2xl w-full shadow-2xl relative z-10 transition-all duration-300">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">
            AI Portfolio Builder
        </h1>
        <p class="text-slate-400 mb-8">Upload your resume and customize your 3D React portfolio aesthetic. We'll generate the source code for you.</p>

        <form action="/generate-portfolio" method="post" enctype="multipart/form-data" class="space-y-6">
            
            <div class="space-y-2">
                <label for="file" class="block font-medium text-slate-300">1. Upload Resume (PDF)</label>
                <input type="file" id="file" name="file" accept="application/pdf" required
                       class="w-full text-sm text-slate-400 file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition cursor-pointer glass rounded-xl">
            </div>

            <div class="space-y-2">
                <label for="theme" class="block font-medium text-slate-300">2. Select Theme</label>
                <select id="theme" name="theme" class="w-full p-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white outline-none focus:border-blue-500 transition">
                    <option value="Auto">Auto (System Default)</option>
                    <option value="Dark Mode" selected>Dark Mode (Premium)</option>
                    <option value="Light Mode">Light Mode (Clean)</option>
                </select>
            </div>

            <div class="space-y-2">
                <label for="design_style" class="block font-medium text-slate-300">3. Select Design Pattern</label>
                <select id="design_style" name="design_style" class="w-full p-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white outline-none focus:border-blue-500 transition">
                    <option value="Glassmorphism" selected>Glassmorphism (Frosted Glass, Modern)</option>
                    <option value="Neo-Brutalism">Neo-Brutalism (Bold, High Contrast)</option>
                    <option value="Minimal">Minimal (Subtle, Typography-focused)</option>
                    <option value="Classic">Classic Corporate (Professional)</option>
                </select>
            </div>

            <div class="space-y-2 flex items-center space-x-3 mt-4">
                <input type="checkbox" id="use_3d_elements" name="use_3d_elements" value="true" checked
                       class="w-5 h-5 text-purple-600 bg-slate-800 border-slate-600 rounded focus:ring-purple-500">
                <label for="use_3d_elements" class="font-medium text-slate-300">Enable 3D WebGL Elements</label>
            </div>

            <div class="space-y-2 text-slate-400 text-sm">
                <p>Hidden Interactions Preference:</p>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <label class="flex items-center space-x-2"><input type="radio" name="interactions" value="Smooth Scroll" checked> <span>Smooth Scrolling</span></label>
                    <label class="flex items-center space-x-2"><input type="radio" name="interactions" value="Mouse Trailing"> <span>Mouse Trailer</span></label>
                    <label class="flex items-center space-x-2"><input type="radio" name="interactions" value="Hover Physics"> <span>Hover Physics</span></label>
                    <label class="flex items-center space-x-2"><input type="radio" name="interactions" value="Parallax"> <span>Parallax</span></label>
                </div>
            </div>

            <button type="submit" class="w-full mt-6 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold rounded-xl hover:opacity-90 shadow-lg shadow-purple-500/30 transition transform hover:scale-[1.02] active:scale-[0.98]">
                Generate React App Data
            </button>
        </form>
    </main>
</body>
</html>
