<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Spinner CSS */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #a855f7;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Step Transitions */
        .step-hidden {
            display: none;
            opacity: 0;
        }

        .step-active {
            display: block;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Ambient glow -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-purple-900/20 rounded-full blur-[120px] -z-10">
    </div>

    <main class="glass rounded-3xl p-10 max-w-2xl w-full shadow-2xl relative z-10">
        <h1 class="text-5xl font-black mb-3 tracking-tight">
            Portfolio <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">Engine_</span>
        </h1>
        <p class="text-slate-400 mb-10 text-lg">AI-generated React masterpieces tailored to your career DNA.</p>

        <!-- STEP 1: Upload -->
        <div id="step-1" class="step-active">
            <div class="space-y-4">
                <label for="file" class="block font-semibold text-slate-300">Target Resume (PDF)</label>
                <div class="border-2 border-dashed border-slate-700 rounded-2xl p-8 text-center hover:border-purple-500 transition cursor-pointer"
                    onclick="document.getElementById('file').click()">
                    <input type="file" id="file" accept="application/pdf" class="hidden"
                        onchange="handleFileSelect(event)">
                    <p id="file-name" class="text-slate-400">Click to browse or drag PDF here.</p>
                </div>
                <button id="analyze-btn" onclick="analyzeResume()"
                    class="w-full mt-4 py-4 bg-white text-black font-bold rounded-xl hover:bg-slate-200 transition disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled>
                    Analyze Identity Profile
                </button>
            </div>
        </div>

        <!-- LOADING OVERLAY -->
        <div id="loading" class="step-hidden flex flex-col items-center justify-center py-12">
            <div class="spinner mb-6"></div>
            <p id="loading-text"
                class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
                Extracting Archetype data...</p>
        </div>

        <!-- STEP 2: Custom Questions -->
        <div id="step-2" class="step-hidden">
            <div class="mb-8 border-l-4 border-purple-500 pl-4">
                <p class="text-sm text-slate-400 font-mono uppercase tracking-widest">Detected Archetype</p>
                <h2 id="archetype-display" class="text-2xl font-bold text-white mt-1">...</h2>
            </div>

            <p class="text-slate-400 mb-6">To dial in the perfect UI/UX for your generated code, answer these quick
                questions:</p>

            <form id="generate-form" onsubmit="generatePortfolio(event)" class="space-y-6">
                <!-- Hidden inputs to carry over PDF and Archetype -->
                <input type="hidden" id="hidden_archetype" name="archetype">

                <div class="space-y-2">
                    <label id="lbl-q1" class="block font-medium text-slate-200">Question 1</label>
                    <input type="text" id="q1" name="q1" required
                        class="w-full p-4 bg-black/50 border border-slate-700 rounded-xl text-white outline-none focus:border-purple-500 transition">
                </div>
                <div class="space-y-2">
                    <label id="lbl-q2" class="block font-medium text-slate-200">Question 2</label>
                    <input type="text" id="q2" name="q2" required
                        class="w-full p-4 bg-black/50 border border-slate-700 rounded-xl text-white outline-none focus:border-purple-500 transition">
                </div>
                <div class="space-y-2">
                    <label id="lbl-q3" class="block font-medium text-slate-200">Question 3</label>
                    <input type="text" id="q3" name="q3" required
                        class="w-full p-4 bg-black/50 border border-slate-700 rounded-xl text-white outline-none focus:border-purple-500 transition">
                </div>

                <button type="submit"
                    class="w-full mt-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold rounded-xl shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:shadow-[0_0_30px_rgba(168,85,247,0.6)] transition transform hover:scale-[1.02] active:scale-[0.98]">
                    Generate React Source Code
                </button>
            </form>
        </div>

    </main>

    <script>
        let selectedFile = null;

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                document.getElementById('file-name').innerText = selectedFile.name;
                document.getElementById('file-name').classList.replace('text-slate-400', 'text-white');
                document.getElementById('file-name').classList.add('font-bold');
                document.getElementById('analyze-btn').disabled = false;
            }
        }

        async function analyzeResume() {
            if (!selectedFile) return;

            // UI State change
            document.getElementById('step-1').classList.replace('step-active', 'step-hidden');
            document.getElementById('loading').classList.replace('step-hidden', 'step-active');

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/analyze-resume', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Analysis failed");
                const data = await response.json();

                if (data.error) {
                    alert("AI Generation Error:\n" + data.error + "\n\nPlease check your OPENAI_API_KEY environment variable on Render/Local .env.");
                    document.getElementById('loading').classList.replace('step-active', 'step-hidden');
                    document.getElementById('step-1').classList.replace('step-hidden', 'step-active');
                    return;
                }

                // Populate Step 2
                document.getElementById('archetype-display').innerText = data.archetype;
                document.getElementById('hidden_archetype').value = data.archetype;

                document.getElementById('lbl-q1').innerText = data.questions[0] || "What is your main goal for this portfolio?";
                document.getElementById('lbl-q2').innerText = data.questions[1] || "Describe your ideal visual aesthetic in 3 words.";
                document.getElementById('lbl-q3').innerText = data.questions[2] || "Who is the primary audience viewing this?";

                // Transition UI
                document.getElementById('loading').classList.replace('step-active', 'step-hidden');
                document.getElementById('step-2').classList.replace('step-hidden', 'step-active');

            } catch (error) {
                console.error(error);
                alert("An error occurred during AI analysis: " + error.message);
                // Reset UI
                document.getElementById('loading').classList.replace('step-active', 'step-hidden');
                document.getElementById('step-1').classList.replace('step-hidden', 'step-active');
            }
        }

        async function generatePortfolio(event) {
            event.preventDefault();

            // UI State change
            document.getElementById('step-2').classList.replace('step-active', 'step-hidden');
            const loadingDiv = document.getElementById('loading');
            loadingDiv.classList.replace('step-hidden', 'step-active');
            document.getElementById('loading-text').innerText = "AI is writing your React Application. This takes about 15 seconds...";

            const formData = new FormData(event.target);
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/generate-portfolio', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Generation failed");

                // Trigger Download
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "portfolio.zip";
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

                // Reset UI for another generation
                loadingDiv.classList.replace('step-active', 'step-hidden');
                document.getElementById('step-2').classList.replace('step-hidden', 'step-active');

            } catch (error) {
                console.error(error);
                alert("An error occurred while generating the portfolio.");
                loadingDiv.classList.replace('step-active', 'step-hidden');
                document.getElementById('step-2').classList.replace('step-hidden', 'step-active');
            }
        }
    </script>
</body>

</html>
